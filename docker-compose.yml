services:
  db:
    image: postgres:16-alpine
    container_name: jugasaro-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jugasaro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jugasaro_dev}
      POSTGRES_DB: ${POSTGRES_DB:-jugasaro}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - jugasaro_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-jugasaro} -d ${POSTGRES_DB:-jugasaro}']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  jugasaro_db_data:
